    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              brand: {
                dark: '#0F172A',
                surface: '#F8FAFC',
                gray: '#64748B',
                border: '#E2E8F0',
                primary: '#2563EB',
              }
            },
            boxShadow: {

            }

    <style>
      body {
