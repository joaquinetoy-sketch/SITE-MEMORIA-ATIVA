name: Deploy React/Vite to Hostinger

on:
  push:
    branches:
      - main  # O robô trabalha sempre que você enviar algo para a branch principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🛠️ Gerar o Build (Vite)
        run: npm run build

      - name: 🚀 Deploy via FTP para a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          # Isso apaga arquivos velhos no servidor que você removeu do código
          dangerous-clean-slate: false

